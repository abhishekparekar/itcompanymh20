<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>UF Global Solutions Pvt Ltd</title>
    <script>
      // GitHub Pages SPA redirect trick
      // Saves the full URL in sessionStorage and redirects to /
      var l = window.location;
      sessionStorage.redirect = l.href;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/'
      );
    </script>
  </head>
  <body></body>
</html>
